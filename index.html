<script>
    // --- TÍNH NĂNG: LƯU TRẠNG THÁI ĐĂNG NHẬP (AUTO LOGIN BYPASS OBFUSCATION) ---
    const originalFetch = window.fetch;
    window.fetch = async function() {
        if (arguments[0] && typeof arguments[0] === 'string') {
            arguments[0] = arguments[0].replace("https://nroghost.com", "");
        }
        
        const url = arguments[0];
        const options = arguments[1];
        
        // NẾU ĐANG KÍCH HOẠT AUTO LOGIN BẰNG FAKE REQUEST
        if (window.__AUTO_LOGIN_USER__ && typeof url === 'string' && url.includes('/login') && options && options.method === 'POST') {
            const fakeUser = window.__AUTO_LOGIN_USER__;
            window.__AUTO_LOGIN_USER__ = null; // Chỉ dùng 1 lần
            
            // Trả về một Response giả mạo thành công để đánh lừa mã nguồn bị mã hóa
            return new Response(JSON.stringify({
                message: "Khôi phục phiên đăng nhập",
                username: fakeUser
            }), {
                status: 200,
                headers: { 'Content-Type': 'application/json' }
            });
        }
        
        const response = await originalFetch.apply(this, arguments);
        
        // Bắt sự kiện Login/Register thành công thật sự để lưu vào SessionStorage
        if (typeof url === 'string' && (url.includes('/login') || url.includes('/register')) && options && options.method === 'POST') {
            const clone = response.clone();
            clone.json().then(data => {
                if (response.ok && (data.username || (data.message && data.message.includes('thành công')))) {
                    let userToSave = data.username;
                    if (!userToSave && options.body) {
                        try {
                            const bodyObj = JSON.parse(options.body);
                            userToSave = bodyObj.username || bodyObj.email;
                        } catch(e) {}
                    }
                    if (userToSave) {
                        sessionStorage.setItem('THEGHOST_SAVED_USER', userToSave);
                    }
                }
            }).catch(e => {});
        }
        
        return response;
    };
    
    // Script kích hoạt Auto Login khi tải trang xong
    document.addEventListener('DOMContentLoaded', () => {
        const savedUser = sessionStorage.getItem('THEGHOST_SAVED_USER');
        if (savedUser) {
            setTimeout(() => {
                if (typeof handleAuth === 'function') {
                    // Kích hoạt cờ để fetch chặn lại
                    window.__AUTO_LOGIN_USER__ = savedUser;
                    
                    // Điền bừa dữ liệu để handleAuth không bị lỗi undefined
                    const emailInput = document.getElementById('login-email');
                    const passInput = document.getElementById('login-password');
                    if (emailInput) emailInput.value = "auto@login.com";
                    if (passInput) passInput.value = "auto";
                    
                    // Gọi thẳng hàm đăng nhập (đã bị mã hóa) của hệ thống
                    handleAuth({ preventDefault: () => {} }, 'login');
                    
                    // Sau đó xóa dữ liệu rác đi
                    setTimeout(() => {
                        if (emailInput) emailInput.value = "";
                        if (passInput) passInput.value = "";
                    }, 100);
                }
            }, 300);
        }
    });

    // Bắt sự kiện đăng xuất để xóa bộ nhớ
    document.addEventListener('click', (e) => {
        if ((e.target.innerText && e.target.innerText.includes('Đăng xuất')) || 
            (e.target.closest('li') && e.target.closest('li').getAttribute('onclick') === 'logout()') ||
            (typeof e.target.getAttribute === 'function' && e.target.getAttribute('onclick') === 'logout()')) {
            sessionStorage.removeItem('THEGHOST_SAVED_USER');
        }
    });
</script>

<script>
    // --- TÍNH NĂNG: GLOBAL REALTIME POLLING (TỰ ĐỘNG CẬP NHẬT MỌI THỨ KHÔNG CẦN TẢI LẠI TRANG) ---
    let lastKnownBalance = -1;

    setInterval(() => {
        // Chỉ chạy khi user đã đăng nhập
        if (typeof CURRENT_USER_ID !== 'undefined' && CURRENT_USER_ID !== 'guest') {
            
            const balanceEl = document.getElementById('header-balance');
            if (!balanceEl) return;
            
            // Nếu là lần đầu chạy, gán lastKnownBalance
            if (lastKnownBalance === -1) {
                const currentStr = balanceEl.innerText.replace(/[^0-9]/g, '');
                lastKnownBalance = parseInt(currentStr) || 0;
            }
            
            // Gọi API kiểm tra số dư và dữ liệu mới
            fetch(API_URL + '/user-data/' + CURRENT_USER_ID)
                .then(res => {
                    if (res.status === 404) {
                        localStorage.removeItem('savedUser');
                        CURRENT_USER_ID = 'guest';
                        location.reload();
                    }
                    return res.json();
                })
                .then(data => {
                    if (data && typeof data.balance === 'number') {
                        // Nếu phát hiện có sự thay đổi số dư (tăng hoặc giảm)
                        if (data.balance !== lastKnownBalance) {
                            const diff = data.balance - lastKnownBalance;
                            lastKnownBalance = data.balance;
                            
                            // 1. Cập nhật lại toàn bộ giao diện (Số dư, Lịch sử, Đơn hàng) mà không cần tải lại trang
                            if (typeof loadUserData === 'function') loadUserData(CURRENT_USER_ID);
                            
                            // 2. Xử lý riêng cho màn hình Nạp Tiền (Nếu đang mở)
                            const topupModal = document.getElementById('topup-modal');
                            if (diff > 0 && topupModal && topupModal.classList.contains('show')) {
                                const qrImg = document.getElementById('sepay-qr-img');
                                if (qrImg && !document.getElementById('qr-success-msg')) {
                                    qrImg.style.display = 'none';
                                    const parent = qrImg.parentElement;
                                    const successUI = document.createElement('div');
                                    successUI.id = 'qr-success-msg';
                                    successUI.style.display = 'flex';
                                    successUI.style.flexDirection = 'column';
                                    successUI.style.alignItems = 'center';
                                    successUI.style.justifyContent = 'center';
                                    successUI.style.padding = '40px 10px';
                                    successUI.style.background = 'rgba(16, 185, 129, 0.1)';
                                    successUI.style.border = '2px dashed #10b981';
                                    successUI.style.borderRadius = '10px';
                                    successUI.style.marginTop = '10px';
                                    successUI.innerHTML = `
                                        <i class="fas fa-check-circle" style="font-size: 3.5rem; color: #10b981; margin-bottom: 15px; animation: bounce 1s infinite;"></i>
                                        <h3 style="color: #10b981; margin: 0 0 10px 0;">CHUYỂN KHOẢN THÀNH CÔNG!</h3>
                                        <p style="color: #fff; font-size: 1.1rem; margin: 0;">Hệ thống đã ghi nhận: <strong style="color: #a855f7;">+${diff.toLocaleString()}đ</strong></p>
                                    `;
                                    parent.appendChild(successUI);
                                    
                                    if (typeof showToast === 'function') showToast("Nhận tiền thành công! Cảm ơn bạn.");
                                    
                                    setTimeout(() => {
                                        if (typeof closeTopupModal === 'function') closeTopupModal();
                                        qrImg.style.display = 'block';
                                        successUI.remove();
                                    }, 4000);
                                }
                            } else if (diff > 0) {
                                // Nếu tiền được cộng mà không mở bảng nạp (ví dụ Admin cộng tiền)
                                if (typeof showToast === 'function') showToast("Tài khoản vừa được cộng: +" + diff.toLocaleString() + "đ");
                            }
                        }
                    }
                })
                .catch(err => console.log('Lỗi đồng bộ Realtime:', err));
                
            // Tự động kéo lại danh sách sản phẩm để cập nhật tồn kho (mỗi 10 giây 1 lần = sau 3 chu kỳ)
            if (!window.pollTick) window.pollTick = 0;
            window.pollTick++;
            if (window.pollTick >= 3) {
                window.pollTick = 0;
                if (typeof loadClientProducts === 'function') loadClientProducts();
            }
        }
    }, 4000); // Tốc độ quét 4 giây / lần (Realtime Simulation)
</script>


<script>
    // Ghi đè hàm loadUserData để tự động hiển thị mảng history
    document.addEventListener('DOMContentLoaded', () => {
        // Lưu lại fetch gốc để bắt dữ liệu /user-data
        const origFetch = window.fetch;
        window.fetch = async function() {
            const response = await origFetch.apply(this, arguments);
            const url = arguments[0];
            if (typeof url === 'string' && url.includes('/user-data/')) {
                const clone = response.clone();
                clone.json().then(data => {
                    if (data && data.history) {
                        const historyTbody = document.getElementById('history-tbody');
                        if (historyTbody) {
                            historyTbody.innerHTML = '';
                            if (data.history.length === 0) {
                                historyTbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px; color:#9ca3af;">Chưa có lịch sử giao dịch.</td></tr>';
                                return;
                            }
                            data.history.forEach(item => {
                                const d = new Date(item.date);
                                const timeStr = `${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')} ${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`;
                                
                                // Logic màu sắc và dấu tick/x
                                let statusIcon = '';
                                let statusText = item.status || 'Thành công';
                                let statusColor = '';
                                
                                if (statusText === 'Thành công') {
                                    statusIcon = '<i class="fas fa-check-circle" style="color:#10b981;"></i>';
                                    statusColor = 'color: #10b981;';
                                } else if (statusText === 'Thất bại') {
                                    statusIcon = '<i class="fas fa-times-circle" style="color:#ef4444;"></i>';
                                    statusColor = 'color: #ef4444;';
                                } else {
                                    statusIcon = '<i class="fas fa-clock" style="color:#fbbf24;"></i>';
                                    statusColor = 'color: #fbbf24;';
                                }
                                
                                // Nếu là trừ tiền mua hàng
                                let amountDisplay = item.type.includes('Mua') ? '-' : '+';
                                let amountColor = item.type.includes('Mua') ? 'color:#ef4444;' : 'color:#10b981;';
                                
                                const row = `<tr>
                                    <td><span class="order-id">${item._id.substring(item._id.length-6).toUpperCase()}</span></td>
                                    <td><strong>${item.type}</strong></td>
                                    <td style="${amountColor} font-weight:bold;">${amountDisplay}${item.amount.toLocaleString()}đ</td>
                                    <td class="text-muted">${item.desc}</td>
                                    <td><span style="${statusColor} font-weight:700; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 6px;">${statusIcon} ${statusText}</span> <br><small class="text-muted" style="font-size:0.8rem;">${timeStr}</small></td>
                                </tr>`;
                                historyTbody.insertAdjacentHTML('beforeend', row);
                            });
                        }
                    }
                }).catch(e => {});
            }
            return response;
        };
    });
</script>
